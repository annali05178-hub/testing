<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studio Calc | Professional Edition</title>
    <style>
        :root { 
            --glass: rgba(255, 255, 255, 0.7); 
            --accent: #d4a373; 
            --text: #4a423d; 
            --dark: #3e3834;
        }
        * { box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(135deg, #f4ece4 0%, #e2d1c3 100%); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
        }

        .card { 
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.4); 
            border-radius: 30px; 
            padding: 2rem; 
            width: 100%; 
            max-width: 450px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.06); 
        }

        h1 { font-weight: 300; font-size: 1.5rem; text-align: center; margin-bottom: 1.5rem; letter-spacing: 2px; color: #6b5e54; }
        
        /* Customer Info Section */
        .info-section { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            margin-bottom: 1.5rem; 
        }
        .info-section input { 
            padding: 12px; 
            border-radius: 12px; 
            border: 1px solid #ddd; 
            font-size: 1rem; 
            background: rgba(255,255,255,0.8); 
            outline: none;
        }

        .service-block { 
            margin-bottom: 1rem; 
            background: rgba(255, 255, 255, 0.4); 
            padding: 15px; 
            border-radius: 20px; 
            border: 1px solid transparent; 
            transition: 0.3s ease;
        }
        .active-service { border-color: var(--accent); background: rgba(255, 255, 255, 0.8); }

        .service-header { display: flex; justify-content: space-between; align-items: center; font-weight: 600; }
        
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #d1d1d1; transition: .4s; border-radius: 24px; }
        input:checked + .slider { background-color: var(--accent); }

        .addon-group { display: none; flex-direction: column; gap: 10px; margin-top: 15px; }
        .active-service .addon-group { display: flex; }
        
        .button-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .addon-btn { 
            border: 1px solid #e0e0e0; 
            background: white; 
            padding: 10px 2px; 
            border-radius: 10px; 
            font-size: 0.75rem; 
            cursor: pointer; 
            color: var(--text); 
            transition: 0.2s;
        }
        .addon-btn.selected { background: var(--accent); color: white; border-color: var(--accent); }
        
        .custom-row { display: flex; gap: 8px; margin-top: 5px; }
        .custom-row input { padding: 10px; border-radius: 10px; border: 1px solid #ddd; font-size: 0.9rem; }

        .discount-grid { display: flex; gap: 10px; margin-top: 1.5rem; }
        .discount-grid div { flex: 1; }
        .discount-grid label { font-size: 0.65rem; font-weight: bold; margin-bottom: 5px; display: block; }
        .discount-grid input { padding: 10px; border-radius: 10px; border: 1px solid #ddd; width: 100%; }

        .result-panel { background: var(--dark); color: white; border-radius: 24px; padding: 25px; margin-top: 1.5rem; text-align: center; }
        .result-panel span { font-size: 0.8rem; opacity: 0.7; text-transform: uppercase; }
        #total-display { font-size: 2.8rem; display: block; font-weight: 700; margin-top: 5px; }
        
        .btn-copy { 
            width: 100%; border: none; background: var(--accent); color: white; 
            padding: 16px; border-radius: 15px; cursor: pointer; font-weight: 600; 
            font-size: 1.1rem; margin-top: 15px; transition: 0.3s;
        }
        .btn-copy:hover { background: #bc8a5f; }
        
        .btn-reset { 
            width: 100%; border: none; background: transparent; 
            padding: 10px; cursor: pointer; font-size: 0.85rem; 
            text-decoration: underline; opacity: 0.5; color: var(--text); 
        }
    </style>
</head>
<body>

<div class="card">
    <h1>STUDIO CALC</h1>

    <div class="info-section">
        <input type="text" id="cust-name" placeholder="Customer Name">
        <input type="tel" id="cust-phone" placeholder="Phone Number">
    </div>

    <div class="service-block" id="block-hand">
        <div class="service-header">
            <label>Hand ($338)</label>
            <label class="switch"><input type="checkbox" id="check-hand" onchange="updateUI()"><span class="slider"></span></label>
        </div>
        <div class="addon-group">
            <div class="button-row">
                <button class="addon-btn" onclick="toggleAddon(this)">French $150</button>
                <button class="addon-btn" onclick="toggleAddon(this)">漸變 $120</button>
                <button class="addon-btn" onclick="toggleAddon(this)">+C $50</button>
            </div>
            <div class="custom-row">
                <input type="text" placeholder="Custom Service" id="custom-hand-name" style="flex:2">
                <input type="number" placeholder="$" id="custom-hand-price" oninput="updateUI()" style="flex:1">
            </div>
        </div>
    </div>

    <div class="service-block" id="block-feet">
        <div class="service-header">
            <label>Feet ($388)</label>
            <label class="switch"><input type="checkbox" id="check-feet" onchange="updateUI()"><span class="slider"></span></label>
        </div>
        <div class="addon-group">
            <div class="button-row">
                <button class="addon-btn" onclick="toggleAddon(this)">+A $30</button>
                <button class="addon-btn" onclick="toggleAddon(this)">+B $20</button>
                <button class="addon-btn" onclick="toggleAddon(this)">+C $50</button>
            </div>
            <div class="custom-row">
                <input type="text" placeholder="Custom" id="custom-feet-name" style="flex:2">
                <input type="number" placeholder="$" id="custom-feet-price" oninput="updateUI()" style="flex:1">
            </div>
        </div>
    </div>

    <div class="service-block" id="block-lash">
        <div class="service-header">
            <label>Lash ($408)</label>
            <label class="switch"><input type="checkbox" id="check-lash" onchange="updateUI()"><span class="slider"></span></label>
        </div>
        <div class="addon-group">
            <div class="button-row">
                <button class="addon-btn" onclick="toggleAddon(this)">+A $30</button>
                <button class="addon-btn" onclick="toggleAddon(this)">+B $20</button>
                <button class="addon-btn" onclick="toggleAddon(this)">+C $50</button>
            </div>
            <div class="custom-row">
                <input type="text" placeholder="Custom" id="custom-lash-name" style="flex:2">
                <input type="number" placeholder="$" id="custom-lash-price" oninput="updateUI()" style="flex:1">
            </div>
        </div>
    </div>

    <div class="discount-grid">
        <div><label>DISCOUNT %</label><input type="number" id="disc-percent" placeholder="0" oninput="updateUI()"></div>
        <div><label>DISCOUNT $</label><input type="number" id="disc-cash" placeholder="0" oninput="updateUI()"></div>
    </div>

    <div class="result-panel">
        <span>Final Total Fee</span>
        <span id="total-display">$0</span>
    </div>

    <button class="btn-copy" onclick="copySummary()">📋 Copy Summary</button>
    <button class="btn-reset" onclick="resetAll()">Reset All Fields</button>
</div>

<script>
    function updateUI() {
        const services = [{id:'hand',base:338},{id:'feet',base:388},{id:'lash',base:408}];
        let subtotal = 0;

        services.forEach(s => {
            const isChecked = document.getElementById('check-'+s.id).checked;
            const block = document.getElementById('block-'+s.id);
            if (isChecked) {
                block.classList.add('active-service');
                subtotal += s.base;
                block.querySelectorAll('.addon-btn.selected').forEach(btn => {
                    subtotal += parseInt(btn.innerText.match(/\d+/)[0]);
                });
                subtotal += parseFloat(document.getElementById(`custom-${s.id}-price`).value) || 0;
            } else {
                block.classList.remove('active-service');
            }
        });

        const dP = parseFloat(document.getElementById('disc-percent').value) || 0;
        const dC = parseFloat(document.getElementById('disc-cash').value) || 0;
        let final = subtotal * (1 - (dP / 100)) - dC;
        document.getElementById('total-display').innerText = '$' + Math.round(Math.max(0, final));
    }

    function toggleAddon(btn) {
        btn.classList.toggle('selected');
        updateUI();
    }

    function resetAll() {
        document.querySelectorAll('input').forEach(el => el.value = '');
        document.querySelectorAll('input[type=checkbox]').forEach(el => el.checked = false);
        document.querySelectorAll('.addon-btn').forEach(el => el.classList.remove('selected'));
        updateUI();
    }

    // (3) Automated Timestamp & Summary Copy Function
    function copySummary() {
        const now = new Date();
        const timestamp = now.toLocaleString('en-HK', { hour12: true }); // Formats date and time
        
        const name = document.getElementById('cust-name').value || "Not specified";
        const phone = document.getElementById('cust-phone').value || "Not specified";
        
        let text = `✨ STUDIO RECEIPT ✨\n`;
        text += `--------------------------\n`;
        text += `Date/Time: ${timestamp}\n`;
        text += `Customer: ${name}\n`;
        text += `Phone: ${phone}\n`;
        text += `--------------------------\n`;

        const services = [{id:'hand',name:'Hand',base:338},{id:'feet',name:'Feet',base:388},{id:'lash',name:'Lash',base:408}];
        let hasService = false;

        services.forEach(s => {
            if (document.getElementById('check-'+s.id).checked) {
                hasService = true;
                text += `• ${s.name} Base: $${s.base}\n`;
                
                const addons = document.getElementById('block-'+s.id).querySelectorAll('.addon-btn.selected');
                addons.forEach(btn => {
                    text += `  + ${btn.innerText}\n`;
                });

                const cp = parseFloat(document.getElementById(`custom-${s.id}-price`).value) || 0;
                const cn = document.getElementById(`custom-${s.id}-name`).value || "Custom Item";
                if(cp > 0) {
                    text += `  + ${cn}: $${cp}\n`;
                }
            }
        });

        if (!hasService) {
            alert("Please select at least one service.");
            return;
        }

        const dP = document.getElementById('disc-percent').value || 0;
        const dC = document.getElementById('disc-cash').value || 0;
        const final = document.getElementById('total-display').innerText;

        text += `--------------------------\n`;
        if (dP > 0 || dC > 0) {
            text += `Discount: ${dP}% / -$${dC}\n`;
        }
        text += `TOTAL: ${final}\n`;
        text += `--------------------------\n`;
        text += `Thank you for choosing us! 🌸`;

        navigator.clipboard.writeText(text).then(() => {
            alert("Summary copied to clipboard with timestamp!");
        });
    }
</script>

</body>
</html>
